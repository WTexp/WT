<!DOCTYPE html>
<html>
<head>
    <title>Weather App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f0f8ff;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            width: 200px;
        }

        button {
            padding: 8px 12px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkblue;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            background: white;
            display: inline-block;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h2>Weather Dashboard</h2>

<input type="text" id="city" placeholder="Enter city">
<button onclick="getWeather()">Search</button>

<p id="result"></p>

<script>
function getWeather() {
    let city = document.getElementById("city").value;

    let url = "https://wttr.in/" + city + "?format=j1";

    fetch(url)
    .then(res => res.json())
    .then(data => {
        let temp = data.current_condition[0].temp_C;
        let desc = data.current_condition[0].weatherDesc[0].value;

        document.getElementById("result").innerText =
            "City: " + city + 
            " | Temp: " + temp + "°C" +
            " | Weather: " + desc;
    })
    .catch(() => {
        document.getElementById("result").innerText = "Error fetching data";
    });
}
</script>

</body>
</html>
